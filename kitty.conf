# BEGIN_KITTY_THEME
# OneDark-Pro
include current-theme.conf
# END_KITTY_THEME

enable_audio_bell no
font_size 12
repaint_delay 1
confirm_os_window_close 0 
paste_actions no-op
window_padding_width 0
# kitty_mod ctrl+a
# scrollback_pager vim -u NONE -
#   \ -c 'w! /tmp/kitty_scrollback' 
#   \ -c 'term ++curwin cat /tmp/kitty_scrollback'
#   \ -c "set clipboard=unnamed"
#   \ -c "hi Normal ctermbg=235"
#   \ -c "nnoremap Y y$"
#   \ -c "tnoremap i ZQ"



# map kitty_mod+i show_scrollback
# BEGIN_KITTY_FONTS
font_family      family='Liga SFMono Nerd Font' postscript_name=LigaSFMonoNerdFont-Regular
# font_family      family='Monocraft Font' postscript_name=Monocraft
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
#
background_opacity 0.80

# tab_bar_style hidden
map ctrl+a>$ set_tab_title " "
enabled_layouts splits:split_axis=horizontal,stack,grid

# Layout
map ctrl+a>space next_layout
map ctrl+a>z toggle_layout stack
map ctrl+a>c launch --type=tab --cwd=current
map ctrl+a>t new_tab !neighbor

# Movement
map ctrl+a>h previous_window
map ctrl+a>l next_window
map ctrl+a>j neighboring_window down
map ctrl+a>k neighboring_window up
map ctrl+a>shift+[ move_window left
map ctrl+a>shift+] move_window right

map ctrl+a>p previous_tab
map ctrl+a>n next_tab
map ctrl+a>shift+, move_tab_backward
map ctrl+a>shift+. move_tab_forward

map ctrl+a>x close_window
map ctrl+a>q close_tab


map ctrl+a>1 goto_tab 1
map ctrl+a>2 goto_tab 2
map ctrl+a>3 goto_tab 3
map ctrl+a>4 goto_tab 4
map ctrl+a>5 goto_tab 5
map ctrl+a>6 goto_tab 6
map ctrl+a>7 goto_tab 7
map ctrl+a>8 goto_tab 8
map ctrl+a>9 goto_tab 9
map ctrl+a>0 goto_tab 1

#Tab bar
tab_bar_min_tabs 1
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template {index}
tab_bar_margin_height 3.0 0.0
#Ends Tab bar
